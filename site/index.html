<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lehrer-Bingo Uebersicht</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #f5f7fb;
      color: #111827;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 2rem 1rem 3rem;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
    }

    .menu {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      border: 1px solid #c7d2fe;
      background: #fff;
      color: #111827;
      text-decoration: none;
      border-radius: 10px;
      padding: 0.6rem 0.95rem;
    }

    .btn.primary {
      border-color: #2563eb;
      background: #2563eb;
      color: white;
    }

    .hint {
      color: #4b5563;
      margin-top: 0;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 0.8rem;
      margin-top: 1.2rem;
    }

    .card {
      display: block;
      background: white;
      border: 1px solid #dbe3f1;
      border-radius: 12px;
      padding: 0.9rem;
      text-decoration: none;
      color: inherit;
    }

    .card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #dbe3f1;
      margin-bottom: 0.65rem;
      background: #f1f5f9;
    }

    .card:hover {
      border-color: #93c5fd;
      box-shadow: 0 8px 24px rgba(30, 64, 175, 0.08);
    }

    .card h2 {
      font-size: 1.1rem;
      margin: 0 0 0.45rem;
    }

    .card p {
      margin: 0;
      color: #475569;
    }
  </style>
</head>
<body>
  <main>
    <div class="top">
      <div>
        <h1>Lehrer-Bingo</h1>
        <p class="hint">Waehle ein Bingo und hake Felder direkt im Browser ab.</p>
      </div>
      <nav class="menu" aria-label="Hauptmenue">
        <a class="btn primary" href="./neu/index.html">Neues Bingo erstellen</a>
      </nav>
    </div>
    <section class="cards" aria-label="Bingo-Liste">
      <a class="card" href="./bingos/umar-bingo.html">
        
        <h2>Umar-Bingo</h2>
        <p>Netzwerktechnik ist peak</p>
      </a>
    </section>
  </main>
</body>
</html>
