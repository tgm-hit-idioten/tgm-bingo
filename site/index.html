<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lehrer-Bingo Übersicht</title>
  <script>
  (() => {
    try {
      const mode = localStorage.getItem('theme-preference');
      if (mode === 'light' || mode === 'dark') {
        document.documentElement.dataset.theme = mode;
      }
    } catch {
      // Ignore unavailable storage.
    }
  })();
</script>
  <style>
    body {
      visibility: visible;
    }
  </style>
  <link rel="stylesheet" href="./assets/bingo.css" />
</head>
<body>
  <main>
    <div class="top">
      <div>
        <h1>Lehrer-Bingo</h1>
        <p class="hint">Wähle ein Bingo und hake Felder direkt im Browser ab.</p>
      </div>
      <nav class="menu" aria-label="Hauptmenü">
        <button type="button" id="theme-toggle" class="button theme-toggle">Design: Auto</button>
        <a class="button primary" href="./neu/index.html">Neues Bingo erstellen</a>
      </nav>
    </div>
    <section class="cards" aria-label="Bingo-Liste">
      <a class="card" href="./bingos/nwtk-bingo.html">
        
        <h2>NWTK bingo</h2>
        <p>Umar mit einem a</p>
      </a>
      <a class="card" href="./bingos/sew-bingo.html">
        
        <h2>SEW bingo</h2>
        <p>https://www.youtube.com/watch?v=dMa_DDiTGKc</p>
      </a>
      <a class="card" href="./bingos/syt-bingo.html">
        
        <h2>SYT Bingo</h2>
        <p>ILIE DER GOAT</p>
      </a>
    </section>
  </main>
  <script>
  (() => {
    const button = document.getElementById('theme-toggle');
    if (!button) {
      return;
    }

    const modes = ['auto', 'dark', 'light'];
    const labels = {
      auto: 'Design: Auto',
      dark: 'Design: Dunkel',
      light: 'Design: Hell'
    };

    function getStoredMode() {
      try {
        const value = localStorage.getItem('theme-preference');
        return value === 'dark' || value === 'light' ? value : 'auto';
      } catch {
        return 'auto';
      }
    }

    function applyMode(mode) {
      if (mode === 'auto') {
        delete document.documentElement.dataset.theme;
      } else {
        document.documentElement.dataset.theme = mode;
      }
    }

    function persistMode(mode) {
      try {
        if (mode === 'auto') {
          localStorage.removeItem('theme-preference');
        } else {
          localStorage.setItem('theme-preference', mode);
        }
      } catch {
        // Ignore unavailable storage.
      }
    }

    function updateButton(mode) {
      button.textContent = labels[mode];
      button.setAttribute('aria-label', 'Darstellung wechseln: ' + labels[mode]);
    }

    function nextMode(mode) {
      return modes[(modes.indexOf(mode) + 1) % modes.length];
    }

    let mode = getStoredMode();
    applyMode(mode);
    updateButton(mode);

    button.addEventListener('click', () => {
      mode = nextMode(mode);
      applyMode(mode);
      persistMode(mode);
      updateButton(mode);
    });

    const media = window.matchMedia('(prefers-color-scheme: dark)');
    if (typeof media.addEventListener === 'function') {
      media.addEventListener('change', () => {
        if (mode === 'auto') {
          applyMode('auto');
        }
      });
    }
  })();
</script>
</body>
</html>
